<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>enlace · admin</title>
<meta name="viewport" content="width=device-width,initial-scale=1" />
<style>
  :root {
    --bg: #f6f7f9;
    --panel: #fff;
    --border: #e4e7eb;
    --text: #1f2937;
    --muted: #6b7280;
    --accent: #2563eb;
    --danger: #b91c1c;
    --ok: #15803d;
  }
  body {
    font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    background: var(--bg);
    color: var(--text);
    margin: 0;
    padding: 24px;
    max-width: 960px;
    margin-left: auto;
    margin-right: auto;
  }
  h1 { margin: 0 0 4px 0; }
  .sub { color: var(--muted); margin-bottom: 24px; }
  section {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    margin-bottom: 20px;
  }
  section h2 { margin: 0 0 12px 0; font-size: 18px; }
  table { width: 100%; border-collapse: collapse; }
  th, td {
    text-align: left;
    padding: 8px 6px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  th { color: var(--muted); font-weight: 500; }
  tr:last-child td { border-bottom: none; }
  .actions button { margin-right: 6px; }
  button {
    background: var(--accent);
    color: #fff;
    border: 0;
    padding: 6px 12px;
    border-radius: 5px;
    cursor: pointer;
    font-size: 13px;
  }
  button.danger { background: var(--danger); }
  button.ghost {
    background: transparent;
    color: var(--accent);
    border: 1px solid var(--accent);
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  input[type=email], input[type=password], input[type=text] {
    padding: 6px 8px;
    border: 1px solid var(--border);
    border-radius: 5px;
    font-size: 14px;
    margin-right: 6px;
  }
  .row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .flash {
    padding: 8px 12px;
    border-radius: 5px;
    margin-bottom: 12px;
    font-size: 13px;
    display: none;
  }
  .flash.ok { background: #ecfdf5; color: var(--ok); border: 1px solid #a7f3d0; }
  .flash.err { background: #fef2f2; color: var(--danger); border: 1px solid #fecaca; }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 11px;
    background: #eef2ff;
    color: #3730a3;
  }
  .badge.access-public { background: #ecfdf5; color: var(--ok); }
  .badge.access-protected-shared { background: #fef3c7; color: #92400e; }
  .badge.access-protected-user { background: #fee2e2; color: var(--danger); }
  .badge.access-local { background: #e5e7eb; color: #374151; }
  code { font-family: ui-monospace, "SF Mono", Menlo, monospace; font-size: 12px; }
</style>
</head>
<body>
<h1>enlace · admin</h1>
<div class="sub" id="who">Loading...</div>

<div id="flash" class="flash"></div>

<section>
  <h2>Users</h2>
  <table id="users">
    <thead>
      <tr><th>Email</th><th>Created</th><th>Admin</th><th class="actions">Actions</th></tr>
    </thead>
    <tbody></tbody>
  </table>
</section>

<section>
  <h2>Create user</h2>
  <div class="row">
    <input id="new-email" type="email" placeholder="email@example.com" autocomplete="off" />
    <input id="new-password" type="password" placeholder="password" autocomplete="new-password" />
    <button id="create-btn">Create</button>
  </div>
</section>

<section>
  <h2>Apps</h2>
  <table id="apps">
    <thead>
      <tr><th>Name</th><th>Route</th><th>Access</th><th>Allowed users</th></tr>
    </thead>
    <tbody></tbody>
  </table>
</section>

<script>
"use strict";

const API = "/_admin/api";
const flash = (msg, ok = true) => {
  const el = document.getElementById("flash");
  el.textContent = msg;
  el.className = "flash " + (ok ? "ok" : "err");
  el.style.display = "block";
  setTimeout(() => { el.style.display = "none"; }, 4000);
};

async function csrfToken() {
  const r = await fetch("/auth/csrf", { credentials: "include" });
  if (!r.ok) throw new Error("CSRF fetch failed");
  return (await r.json()).csrf;
}

async function api(method, path, body) {
  const opts = { method, credentials: "include", headers: {} };
  if (method !== "GET" && method !== "HEAD") {
    opts.headers["X-CSRF-Token"] = await csrfToken();
  }
  if (body !== undefined) {
    opts.headers["Content-Type"] = "application/json";
    opts.body = JSON.stringify(body);
  }
  const r = await fetch(API + path, opts);
  if (!r.ok) {
    let msg = `${r.status} ${r.statusText}`;
    try { const j = await r.json(); if (j.detail) msg = j.detail; } catch {}
    throw new Error(msg);
  }
  return r.json();
}

function fmtTime(t) {
  if (!t) return "—";
  return new Date(t * 1000).toISOString().slice(0, 19).replace("T", " ");
}

async function loadWhoami() {
  try {
    const r = await fetch("/auth/whoami", { credentials: "include" });
    const j = await r.json();
    document.getElementById("who").textContent =
      j.email ? `Signed in as ${j.email}` : "Not signed in";
  } catch {
    document.getElementById("who").textContent = "Unable to fetch identity";
  }
}

async function loadUsers() {
  const tbody = document.querySelector("#users tbody");
  tbody.innerHTML = "";
  try {
    const { users } = await api("GET", "/users");
    if (!users.length) {
      tbody.innerHTML = `<tr><td colspan="4" style="color:var(--muted)">No users.</td></tr>`;
      return;
    }
    for (const u of users) {
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td><code>${u.email}</code></td>
        <td>${fmtTime(u.created_at)}</td>
        <td>${u.is_admin ? '<span class="badge">admin</span>' : ""}</td>
        <td class="actions">
          <button class="ghost" data-act="reset" data-email="${u.email}">Reset password</button>
          <button class="danger" data-act="delete" data-email="${u.email}">Delete</button>
        </td>`;
      tbody.appendChild(tr);
    }
  } catch (e) {
    flash("Load users: " + e.message, false);
  }
}

async function loadApps() {
  const tbody = document.querySelector("#apps tbody");
  tbody.innerHTML = "";
  try {
    const { apps } = await api("GET", "/apps");
    for (const a of apps) {
      const accessClass = "access-" + a.access.replace(":", "-");
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td><strong>${a.display_name || a.name}</strong></td>
        <td><code>${a.route_prefix}</code></td>
        <td><span class="badge ${accessClass}">${a.access}</span></td>
        <td>${(a.allowed_users || []).map(e => `<code>${e}</code>`).join(", ") || "—"}</td>`;
      tbody.appendChild(tr);
    }
  } catch (e) {
    flash("Load apps: " + e.message, false);
  }
}

document.querySelector("#users").addEventListener("click", async (ev) => {
  const btn = ev.target.closest("button[data-act]");
  if (!btn) return;
  const email = btn.dataset.email;
  if (btn.dataset.act === "reset") {
    const pw = prompt(`New password for ${email}:`);
    if (!pw) return;
    try {
      await api("POST", `/users/${encodeURIComponent(email)}/password`, { password: pw });
      flash(`Password reset for ${email}.`);
    } catch (e) {
      flash("Reset failed: " + e.message, false);
    }
  } else if (btn.dataset.act === "delete") {
    if (!confirm(`Delete user ${email}? This cannot be undone.`)) return;
    try {
      await api("DELETE", `/users/${encodeURIComponent(email)}`);
      flash(`Deleted ${email}.`);
      loadUsers();
    } catch (e) {
      flash("Delete failed: " + e.message, false);
    }
  }
});

document.getElementById("create-btn").addEventListener("click", async () => {
  const email = document.getElementById("new-email").value.trim();
  const password = document.getElementById("new-password").value;
  if (!email || !password) {
    flash("Email and password required.", false);
    return;
  }
  try {
    await api("POST", "/users", { email, password });
    document.getElementById("new-email").value = "";
    document.getElementById("new-password").value = "";
    flash(`Created ${email}.`);
    loadUsers();
  } catch (e) {
    flash("Create failed: " + e.message, false);
  }
});

loadWhoami();
loadUsers();
loadApps();
</script>
</body>
</html>
